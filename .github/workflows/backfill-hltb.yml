name: Backfill HLTB estimates (one-off)

# One-off job: rewrites hltb.json so every entry carries the new fields the
# estimation upgrade introduced — `raw` (ground-truth HLTB values, zeros nulled),
# filled main/extra/complete for games that only had 1-2 real values, a corrected
# `avg` over the completed triple, an `est` marker on filled fields, and a
# `fetched_at` stamp. Before this, `avg` was the mean of whatever values happened
# to be present, skewing the QHPP score for ~347 games.
#
# Reads whatever the LIVE hltb.json currently is on main (so it never clobbers
# games the refresher resolved since the change was written), backfills in place,
# and commits through the same rebase-onto-main path the refresher uses.
#
# Manual trigger only — it does not run on a schedule. Idempotent: re-running it
# produces the same result (estimates derive from `raw`, never from prior
# estimates), so it's safe to run more than once. Once it has run and committed,
# hltb_refresh.py keeps new games fixed at the source, so this workflow can be
# deleted.
#
# IMPORTANT: shares the `steam-hltb` concurrency group with the HLTB refresher so
# the two can never write hltb.json at the same time. If a refresher run is in
# progress, this queues behind it (cancel-in-progress:false) rather than racing.

on:
  workflow_dispatch:          # run manually from the Actions tab

permissions:
  contents: write             # commits the updated hltb.json

concurrency:
  group: steam-hltb           # SAME group as hltb.yml — must not overlap an HLTB write
  cancel-in-progress: false

jobs:
  backfill-hltb:
    runs-on: ubuntu-latest
    timeout-minutes: 20       # pure local re-processing, no network; finishes in seconds
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # No third-party deps: the backfill only reads/writes JSON and imports the
      # local hltb_estimate module. (No requests / howlongtobeatpy needed — it
      # never touches the network.)

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Backfill HLTB estimates in place
        run: python hltb_backfill.py

      - name: Commit hltb.json
        run: |
          git add hltb.json
          if ! git diff --staged --quiet; then
            git commit -m "hltb backfill: add raw/est/fetched_at, fix skewed avgs"
            git fetch origin main
            git rebase --autostash origin/main
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
