name: Refresh sale end-dates -> sales.json

on:
  workflow_dispatch:        # run manually from the Actions tab
  schedule:
    # FREQUENT — sale end-dates are time-critical and the GetItems endpoint is cheap
    # (batched, ~4 calls for 200 on-sale games), so we re-poll often to catch sale
    # extensions / early endings / %-changes. Offset minutes (:07) so it doesn't collide
    # with the scraper (:17) or the recent-review job (:41); its own concurrency group
    # means runs never overlap each other regardless.
    - cron: "7 */3 * * *"   # every 3 hours

permissions:
  contents: write           # commits sales.json as it runs

concurrency:
  group: steam-sales        # never overlap sales-refresh runs (separate from scraper/recent)
  cancel-in-progress: false

jobs:
  sales:
    runs-on: ubuntu-latest
    timeout-minutes: 75      # batched + cheap; RUN_MINUTES=60 leaves headroom
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Configure git (script commits progress itself, rebasing onto main)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Refresh sale end-dates
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}   # optional (GetItems is public)
          QHPP_CC: "US"
          RUN_MINUTES: "60"
        run: python sales_refresh.py
